<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1128"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#f4d03f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="url(#goldGrad)" stroke-width="2" rx="10"/>

  <!-- Book icon -->
  <g transform="translate(100, 200)">
    <path d="M80 0 L80 180 L0 180 L0 20 C0 9 9 0 20 0 Z" fill="url(#goldGrad)" opacity="0.9"/>
    <path d="M80 0 L80 180 L160 180 L160 20 C160 9 151 0 140 0 Z" fill="url(#goldGrad)" opacity="0.7"/>
    <line x1="80" y1="0" x2="80" y2="180" stroke="#0a1128" stroke-width="3"/>
    <line x1="20" y1="40" x2="60" y2="40" stroke="#0a1128" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="70" x2="60" y2="70" stroke="#0a1128" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="100" x2="60" y2="100" stroke="#0a1128" stroke-width="2" opacity="0.5"/>
    <line x1="100" y1="40" x2="140" y2="40" stroke="#0a1128" stroke-width="2" opacity="0.5"/>
    <line x1="100" y1="70" x2="140" y2="70" stroke="#0a1128" stroke-width="2" opacity="0.5"/>
    <line x1="100" y1="100" x2="140" y2="100" stroke="#0a1128" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Main Title -->
  <text x="350" y="250" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="url(#goldGrad)">BRESLEV</text>
  <text x="350" y="320" font-family="Arial, sans-serif" font-size="32" fill="#ffffff" opacity="0.9">by Esther Ifrah</text>

  <!-- Subtitle -->
  <text x="350" y="400" font-family="Arial, sans-serif" font-size="28" fill="#d4af37">Livres et enseignements de Rabbi Nachman</text>
  <text x="350" y="440" font-family="Arial, sans-serif" font-size="24" fill="#888888">Likoutey Moharan | Likoutey Tefilot | +30 ouvrages</text>

  <!-- Quote -->
  <text x="350" y="520" font-family="Georgia, serif" font-size="20" fill="#d4af37" font-style="italic">"Sache que chaque herbe a son propre chant."</text>
  <text x="780" y="520" font-family="Arial, sans-serif" font-size="16" fill="#888888">- Rabbi Nachman</text>

  <!-- Website -->
  <text x="350" y="580" font-family="Arial, sans-serif" font-size="18" fill="#666666">breslev-books-preview.vercel.app</text>
</svg>
